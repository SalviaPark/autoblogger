name: Fix Broken Images (One-time Migration)

on:
  workflow_dispatch:
    inputs:
      blog_type:
        description: '블로그 타입 (ko 또는 insurance)'
        required: true
        default: 'ko'
        type: choice
        options:
          - ko
          - insurance

jobs:
  fix-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install -r requirements.txt
      - name: 이미지 마이그레이션 실행
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          BLOGGER_TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
          BLOGGER_CLIENT_SECRETS_JSON: ${{ secrets.BLOGGER_CLIENT_SECRETS_JSON }}
          INSURANCE_BLOGGER_TOKEN_JSON: ${{ secrets.INSURANCE_BLOGGER_TOKEN_JSON }}
          INSURANCE_BLOG_URL: ${{ secrets.INSURANCE_BLOG_URL }}
        run: python fix_images.py ${{ github.event.inputs.blog_type }}
